<!DOCTYPE html>
<html>
<head>
  <title>ToolNova</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#4facfe,#00f2fe);
      color: white;
      text-align: center;
    }
    h1 { padding: 10px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      color: black;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
    }

    .tool {
      display: none;
      padding: 15px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px;
    }

    button {
      padding: 10px;
      border: none;
      background: orange;
      color: white;
      border-radius: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>🚀 ToolNova</h1>

<div class="grid">
  <div class="card" onclick="show('qr')">QR</div>
  <div class="card" onclick="show('bar')">Barcode</div>
  <div class="card" onclick="show('yt')">YouTube</div>
  <div class="card" onclick="show('img')">Image</div>
</div>

<!-- QR -->
<div id="qr" class="tool">
  <h2>QR Code</h2>
  <input id="qrText" placeholder="Enter text">
  <button onclick="makeQR()">Generate</button>
  <button onclick="downloadQR()">Download</button>
  <div id="qrBox"></div>
</div>

<!-- Barcode -->
<div id="bar" class="tool">
  <h2>Barcode</h2>
  <input id="barText" placeholder="Enter text">
  <button onclick="makeBar()">Generate</button>
  <button onclick="downloadBar()">Download</button>
  <svg id="barcode"></svg>
</div>

<!-- YouTube -->
<div id="yt" class="tool">
  <h2>YouTube Thumbnail</h2>
  <input id="ytLink" placeholder="Paste link">
  <button onclick="getThumb()">Get</button>
  <img id="thumb" width="200">
</div>

<!-- Image -->
<div id="img" class="tool">
  <h2>Image Preview</h2>
  <input type="file" onchange="preview(event)">
  <img id="preview" width="200">
</div>

<script>

function show(id){
  document.querySelectorAll('.tool').forEach(e=>e.style.display='none');
  document.getElementById(id).style.display='block';
}

function makeQR(){
  document.getElementById("qrBox").innerHTML="";
  new QRCode(document.getElementById("qrBox"), document.getElementById("qrText").value);
}

function downloadQR(){
  let img=document.querySelector("#qrBox img");
  if(!img){alert("Generate first");return;}
  let a=document.createElement('a');
  a.href=img.src;
  a.download="qr.png";
  a.click();
}

function makeBar(){
  JsBarcode("#barcode", document.getElementById("barText").value);
}

function downloadBar(){
  let svg=document.getElementById("barcode");
  let data=new XMLSerializer().serializeToString(svg);
  let blob=new Blob([data],{type:"image/svg+xml"});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  a.href=url;
  a.download="barcode.svg";
  a.click();
}

function getThumb(){
  let id=document.getElementById("ytLink").value.split("v=")[1];
  document.getElementById("thumb").src="https://img.youtube.com/vi/"+id+"/maxresdefault.jpg";
}

function preview(e){
  let reader=new FileReader();
  reader.onload=function(){
    document.getElementById("preview").src=reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
}

</script>

</body>
</html>
