<!DOCTYPE html>
<html>
<head>
  <title>ToolNova Boss</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg,#4facfe,#00f2fe);
      color: white;
      text-align: center;
      transition: 0.3s;
    }

    h1 { padding: 10px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 10px;
      padding: 10px;
    }

    .card {
      background: white;
      color: black;
      padding: 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover { transform: scale(1.05); }

    .tool {
      display: none;
      padding: 15px;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px;
    }

    button {
      padding: 10px;
      border: none;
      background: orange;
      color: white;
      border-radius: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h1>🚀 ToolNova Boss</h1>

<button onclick="darkMode()">🌙 Dark Mode</button>

<div class="grid">
  <div class="card" onclick="show('qr')">QR</div>
  <div class="card" onclick="show('bar')">Barcode</div>
  <div class="card" onclick="show('yt')">YouTube</div>
  <div class="card" onclick="show('img')">Image</div>
  <div class="card" onclick="show('compress')">Compress</div>
</div>

<!-- QR -->
<div id="qr" class="tool">
  <h2>QR Code</h2>
  <input id="qrText" placeholder="Enter text">
  <button onclick="makeQR()">Generate</button>
  <button onclick="downloadQR()">Download</button>
  <div id="qrBox"></div>
</div>

<!-- Barcode -->
<div id="bar" class="tool">
  <h2>Barcode</h2>
  <input id="barText" placeholder="Enter text">
  <button onclick="makeBar()">Generate</button>
  <button onclick="downloadBar()">Download</button>
  <svg id="barcode"></svg>
</div>

<!-- YouTube -->
<div id="yt" class="tool">
  <h2>YouTube Thumbnail</h2>
  <input id="ytLink" placeholder="Paste link">
  <button onclick="getThumb()">Get</button>
  <button onclick="downloadThumb()">Download</button>
  <img id="thumb" width="200">
</div>

<!-- Image -->
<div id="img" class="tool">
  <h2>Image Preview</h2>
  <input type="file" onchange="preview(event)">
  <img id="preview" width="200">
</div>

<!-- Compress -->
<div id="compress" class="tool">
  <h2>Image Compressor</h2>
  <input type="file" onchange="compress(event)">
  <img id="compressImg" width="200">
</div>

<script>

function show(id){
  document.querySelectorAll('.tool').forEach(e=>e.style.display='none');
  document.getElementById(id).style.display='block';
}

/* DARK MODE */
function darkMode(){
  document.body.style.background="black";
}

/* QR */
function makeQR(){
  let text=document.getElementById("qrText").value;
  localStorage.setItem("qr",text);

  document.getElementById("qrBox").innerHTML="";
  new QRCode(document.getElementById("qrBox"), text);
}

function downloadQR(){
  let img=document.querySelector("#qrBox img");
  if(!img){alert("Generate first");return;}
  let a=document.createElement('a');
  a.href=img.src;
  a.download="qr.png";
  a.click();
}

/* LOAD SAVED */
window.onload=function(){
  document.getElementById("qrText").value=localStorage.getItem("qr")||"";
}

/* Barcode */
function makeBar(){
  JsBarcode("#barcode", document.getElementById("barText").value);
}

function downloadBar(){
  let svg=document.getElementById("barcode");
  let data=new XMLSerializer().serializeToString(svg);
  let blob=new Blob([data],{type:"image/svg+xml"});
  let url=URL.createObjectURL(blob);
  let a=document.createElement('a');
  a.href=url;
  a.download="barcode.svg";
  a.click();
}

/* YouTube */
function getThumb(){
  let id=document.getElementById("ytLink").value.split("v=")[1];
  document.getElementById("thumb").src="https://img.youtube.com/vi/"+id+"/maxresdefault.jpg";
}

function downloadThumb(){
  let src=document.getElementById("thumb").src;
  let a=document.createElement('a');
  a.href=src;
  a.download="thumb.jpg";
  a.click();
}

/* Image Preview */
function preview(e){
  let reader=new FileReader();
  reader.onload=function(){
    document.getElementById("preview").src=reader.result;
  }
  reader.readAsDataURL(e.target.files[0]);
}

/* Compress */
function compress(e){
  let reader=new FileReader();
  reader.onload=function(){
    let img=new Image();
    img.src=reader.result;

    img.onload=function(){
      let canvas=document.createElement("canvas");
      let ctx=canvas.getContext("2d");

      canvas.width=img.width/2;
      canvas.height=img.height/2;

      ctx.drawImage(img,0,0,canvas.width,canvas.height);

      let url=canvas.toDataURL("image/jpeg",0.6);
      document.getElementById("compressImg").src=url;
    }
  }
  reader.readAsDataURL(e.target.files[0]);
}

</script>

</body>
</html>
